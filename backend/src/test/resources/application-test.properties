spring.jpa.hibernate.ddl-auto=create-drop
spring.flyway.enabled=true

# Override Google JWKS URI for tests (use WireMock URL via test overrides)
google.jwks-uri=http://localhost:${wiremock.server.port:0}/oauth2/v3/certs

# Suppress Keycloak issuer validation in unit tests
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:${wiremock.server.port:0}/realms/test
