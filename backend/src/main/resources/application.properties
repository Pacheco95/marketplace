spring.application.name=marketplace-backend

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/marketplace
spring.datasource.username=admin
spring.datasource.password=admin
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# Flyway
spring.flyway.locations=classpath:db/migration

# OAuth2 Resource Server — Keycloak
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8180/realms/marketplace

# SpringDoc / Swagger
springdoc.api-docs.path=/api/v1/api-docs
springdoc.swagger-ui.path=/api/v1/swagger-ui.html

# Keycloak client
keycloak.client-id=marketplace-backend
keycloak.client-secret=${KEYCLOAK_CLIENT_SECRET:change-me-in-production}

# Frontend / Backend base URLs
app.frontend.base-url=http://localhost:3000
app.backend.base-url=http://localhost:8080

# Cookie security — set false only for local development (no TLS)
app.cookie.secure=true

# Google JWKS (overridable in tests via WireMock)
google.jwks-uri=https://www.googleapis.com/oauth2/v3/certs

# CORS — allowed frontend origin
app.cors.allowed-origin=http://localhost:3000
