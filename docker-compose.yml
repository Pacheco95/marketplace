services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: marketplace
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - '5433:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U admin -d marketplace']
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.6.1
    command: start-dev --import-realm --features=token-exchange:v1,admin-fine-grained-authz:v1
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: admin
      KC_DB_PASSWORD: admin
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-change-me-in-production}
    volumes:
      - ./docker/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json
    ports:
      - '8180:8080'
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'exec 3<>/dev/tcp/localhost/8080 && printf "GET /realms/marketplace HTTP/1.0\r\nHost: localhost\r\n\r\n" >&3 && grep -q "200 OK" <&3',
        ]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  keycloak-setup:
    image: quay.io/keycloak/keycloak:26.6.1
    depends_on:
      keycloak:
        condition: service_healthy
    volumes:
      - ./docker/keycloak/configure-exchange.sh:/configure-exchange.sh
    entrypoint: ['/bin/bash', '/configure-exchange.sh']
    environment:
      KEYCLOAK_URL: http://keycloak:8080
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    restart: 'no'

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/marketplace
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: admin
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://keycloak:8080/realms/marketplace
      APP_FRONTEND_BASE_URL: http://localhost:3000
      APP_CORS_ALLOWED_ORIGIN: http://localhost:3000
      APP_KEYCLOAK_PUBLIC_URL: http://localhost:8180
      GOOGLE_JWKS_URI: https://www.googleapis.com/oauth2/v3/certs
    ports:
      - '8080:8080'
    depends_on:
      postgres:
        condition: service_healthy
      keycloak-setup:
        condition: service_completed_successfully

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      NUXT_API_BASE_URL: http://backend:8080
      NUXT_PUBLIC_GOOGLE_CLIENT_ID: ${NUXT_PUBLIC_GOOGLE_CLIENT_ID}
    ports:
      - '3000:3000'
    depends_on:
      - backend

volumes:
  postgres_data:
